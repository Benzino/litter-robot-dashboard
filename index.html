<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Litter-Robot Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Segoe UI', system-ui; background: var(--bg); margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .progress-bar { height: 10px; background: #e2e8f0; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--primary); transition: width 0.5s; }
        select { padding: 8px; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container" style="max-width: 1000px; margin: auto;">
    <h1>🐈 Litter-Robot Dashboard</h1>

    <div class="card" style="margin-bottom: 20px;">
        <h3>Robot Status</h3>
        <div style="display: flex; gap: 40px;">
            <div>Network: <strong id="netStatus">...</strong></div>
            <div>Scoops: <strong id="scoopCount">...</strong></div>
        </div>
        <div style="margin-top: 15px;">
            Litter Level: <span id="litterPct">0%</span>
            <div class="progress-bar"><div id="litterBar" class="progress-fill" style="width: 0%"></div></div>
            Waste Drawer: <span id="wastePct">0%</span>
            <div class="progress-bar"><div id="wasteBar" class="progress-fill" style="width: 0%"></div></div>
        </div>
    </div>

    <div id="catCards" class="grid"></div>

    <div class="card" style="margin-top: 20px;">
        <h3>Visit Timeline (Last 14 Days)</h3>
        <canvas id="scatterChart" height="100"></canvas>
    </div>

    <div class="grid" style="margin-top: 20px;">
        <div class="card">
            <h3>Weight History (kg)</h3>
            <select id="weightPeriod" onchange="updateCharts()">
                <option value="7">Last Week</option><option value="30">Last Month</option><option value="180">Last 6 Months</option>
            </select>
            <canvas id="weightChart"></canvas>
        </div>
        <div class="card">
            <h3>Visits History</h3>
            <select id="visitPeriod" onchange="updateCharts()">
                <option value="7">Last Week</option><option value="30">Last Month</option>
            </select>
            <canvas id="visitChart"></canvas>
        </div>
    </div>
</div>

<script>
    let dashboardData = {};
    let charts = {}; // To store chart instances

    async function init() {
        try {
            const res = await fetch('data.json?t=' + Date.now());
            dashboardData = await res.json();
            renderStats();
            updateCharts();
        } catch (e) { console.error("Error loading data:", e); }
    }

    function renderStats() {
        // Robot Status
        document.getElementById('netStatus').textContent = dashboardData.robot_metadata.is_online ? "Connected" : "Offline";
        document.getElementById('scoopCount').textContent = dashboardData.robot_metadata.cycle_count;
        document.getElementById('litterPct').textContent = dashboardData.robot_metadata.litter_level + "%";
        document.getElementById('litterBar').style.width = dashboardData.robot_metadata.litter_level + "%";
        document.getElementById('wastePct').textContent = dashboardData.robot_metadata.waste_level + "%";
        document.getElementById('wasteBar').style.width = dashboardData.robot_metadata.waste_level + "%";

        // Cats Profile
        const container = document.getElementById('catCards');
        container.innerHTML = "";
        dashboardData.pet_profiles.forEach(cat => {
            container.innerHTML += `
                <div class="card">
                    <img src="${cat.profile_pic}" style="width:60px; height:60px; border-radius:50%; object-fit:cover;">
                    <h3>${cat.name} (${cat.age} yrs)</h3>
                    <p>Weight: <strong>${cat.latest_weight} kg</strong></p>
                    <p>Visits Today: ${cat.visits_today} | Avg: ${cat.avg_visits}</p>
                    <p>Last: ${cat.last_visit ? new Date(cat.last_visit).toLocaleTimeString() : 'N/A'}</p>
                </div>`;
        });
    }

function updateCharts() {
    const logs = dashboardData.logs || [];
    const ctxWeight = document.getElementById('weightChart').getContext('2d');
    
    // Filter out nulls/zeros so the graph doesn't drop to 0 unexpectedly
    const validLogs = logs.filter(l => l.weight > 0);

    if(charts.weight) charts.weight.destroy();

    const weightDatasets = dashboardData.pet_profiles.map(p => ({
        label: p.name,
        data: validLogs
                .filter(l => l.pet_name === p.name)
                .map(l => ({ x: l.timestamp, y: l.weight }))
    }));

    charts.weight = new Chart(ctxWeight, {
        type: 'line',
        data: { datasets: weightDatasets },
        options: {
            responsive: true,
            scales: { x: { type: 'time', time: { unit: 'day' } } }
        }
    });
}

    
    init();
</script>

</body>
</html>
