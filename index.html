<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Litter-Robot 4 Advanced Analytics</title>
    <!-- Chart.js CDN via jsDelivr -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fb;
            color: #2d3748;
            margin: 0;
            padding: 30px 15px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 { margin-bottom: 8px; color: #1a202c; }
        .subtitle { color: #718096; margin-top: 0; }
        
        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 280px;
        }
        .form-group.short {
            flex: 0 1 200px;
            min-width: 150px;
        }
        label { font-weight: 600; color: #4a5568; font-size: 14px; }
        input[type="text"], select {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            background-color: white;
            height: 48px;
            box-sizing: border-box;
        }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #4299e1;
        }
        button {
            background-color: #4299e1;
            color: white;
            border: none;
            padding: 0 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            height: 48px;
            transition: background 0.2s;
        }
        button:hover { background-color: #3182ce; }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }
        @media (min-width: 900px) {
            .grid { grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); }
        }
        
        .card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            min-height: 380px;
        }
        .card h2 {
            margin-top: 0;
            font-size: 16px;
            color: #2d3748;
            margin-bottom: 20px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .chart-wrapper {
            position: relative;
            height: 300px;
            width: 100%;
        }
        .error-message {
            color: #e53e3e;
            font-weight: 500;
            width: 100%;
            display: none;
            padding: 12px;
            background: #fff5f5;
            border-radius: 6px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Litter-Robot 4 Advanced Analytics</h1>
        <p class="subtitle">Multi-cat monitoring ecosystem</p>
    </header>

    <!-- Top Management Bar -->
    <div class="control-panel">
        <div class="form-group">
            <label for="sheetUrl">Google Sheets Published CSV URL</label>
            <input type="text" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/.../pub?output=csv" />
        </div>
        <div class="form-group short">
            <label for="dateRangeSelector">Timeframe Filter</label>
            <select id="dateRangeSelector" onchange="updateDashboardCharts()">
                <option value="all">All History</option>
                <option value="1">Today Only</option>
                <option value="7" selected>Last 7 Days</option>
                <option value="30">Last 30 Days</option>
            </select>
        </div>
        <button onclick="fetchInitialCSVData()">Sync Source Sheet</button>
        <div id="errorMessage" class="error-message"></div>
    </div>

    <!-- Live Multi-Chart Matrix -->
    <div class="grid">
        <!-- Metric Tracker 1: Weights -->
        <div class="card">
            <h2>Cat Weight Tracks</h2>
            <div class="chart-wrapper">
                <canvas id="weightChart"></canvas>
            </div>
        </div>

        <!-- Metric Tracker 2: Volumetric Traffic Over Days -->
        <div class="card">
            <h2>Daily Visit Volume Trends</h2>
            <div class="chart-wrapper">
                <canvas id="dailyVolumeChart"></canvas>
            </div>
        </div>

        <!-- Metric Tracker 3: Diurnal Density Pattern -->
        <div class="card">
            <h2>Hourly Distribution Profile</h2>
            <div class="chart-wrapper">
                <canvas id="hourlyDensityChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
// Keep references to data arrays and active configurations globally
let globalParsedDataset = [];
let chartWeight = null;
let chartDailyVolume = null;
let chartHourlyDensity = null;

// --- DYNAMIC SYSTEM PROPERTIES ---
const WEIGHT_THRESHOLD_KG = 5.0; // Break line tracking between Cat A and Cat B here

async function fetchInitialCSVData() {
    const urlInput = document.getElementById('sheetUrl').value.trim();
    const errorEl = document.getElementById('errorMessage');
    errorEl.style.display = 'none';

    if (!urlInput) {
        alert('Please map your published Google CSV reference link first.');
        return;
    }

    try {
        const response = await fetch(urlInput);
        if (!response.ok) throw new Error('Data endpoint connection drop.');
        const csvText = await response.text();
        
        const lines = csvText.split('\n');
        const buffer = [];

        lines.forEach(line => {
            const columns = line.split(',').map(col => col.replace(/"/g, '').trim());
            if (columns.length < 3) return;

            const dateObj = new Date(columns[0]);
            const weightVal = parseFloat(columns[2]);

            if (isNaN(dateObj.getTime()) || isNaN(weightVal)) return;
            buffer.push({ date: dateObj, weight: weightVal });
        });

        if (buffer.length === 0) throw new Error('CSV verified empty or headers mismatched.');
        
        // Arrange chronologically prior to caching internally
        buffer.sort((a, b) => a.date - b.date);
        globalParsedDataset = buffer;

        // Render charts using the current filter profile
        updateDashboardCharts();

    } catch (err) {
        errorEl.textContent = 'Error: ' + err.message + ' Verify sharing settings.';
        errorEl.style.display = 'block';
    }
}

function updateDashboardCharts() {
    if (globalParsedDataset.length === 0) return;

    const filterMode = document.getElementById('dateRangeSelector').value;
    let records = [...globalParsedDataset];
    
    // Process filtering conditions cleanly based on current time thresholds
    if (filterMode !== 'all') {
        const targetDays = parseInt(filterMode);
        const barrierDate = new Date();
        barrierDate.setDate(barrierDate.getDate() - targetDays);
        
        if(targetDays === 1) {
            barrierDate.setHours(0,0,0,0); // Align perfectly with midnight for "Today"
        }
        
        records = globalParsedDataset.filter(row => row.date >= barrierDate);
    }

    // Clean out memory references if updating dynamically
    if (chartWeight) chartWeight.destroy();
    if (chartDailyVolume) chartDailyVolume.destroy();
    if (chartHourlyDensity) chartHourlyDensity.destroy();

    // Setup map collection buckets
    const hourlyCounts = Array(24).fill(0);
    const dayFrequencyMap = {};
    
    const timelinesLabels = [];
    const seriesCatALighter = [];
    const seriesCatBHeavier = [];

    records.forEach(item => {
        // 1. Map Time Records
        const labelStamp = item.date.toLocaleDateString([], { month: 'short', day: 'numeric' }) + 
                           ' ' + 
                           item.date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        timelinesLabels.push(labelStamp);

        // 2. Distribute Weight Class Data points
        if (item.weight < WEIGHT_THRESHOLD_KG) {
            seriesCatALighter.push(item.weight);
            seriesCatBHeavier.push(null);
        } else {
            seriesCatBHeavier.push(item.weight);
            seriesCatALighter.push(null);
        }

        // 3. Increment Hourly Density
        hourlyCounts[item.date.getHours()]++;

        // 4. Increment Volumetric Tracking Array Buckets
        const dayKey = item.date.toISOString().split('T')[0];
        dayFrequencyMap[dayKey] = (dayFrequencyMap[dayKey] || 0) + 1;
    });

    // Structure Volumetric Axis Formats
    const sortedDays = Object.keys(dayFrequencyMap).sort();
    const dailyVolumeLabels = sortedDays.map(dStr => {
        const [y, m, d] = dStr.split('-');
        return new Date(y, m - 1, d).toLocaleDateString([], { month: 'short', day: 'numeric' });
    });
    const dailyVolumeData = sortedDays.map(dStr => dayFrequencyMap[dStr]);

    // -----------------------------------------------------------------
    // GRAPH DESIGNS (CHART.JS ATTACHMENTS)
    // -----------------------------------------------------------------

    // Chart 1: Weight Tracks
    chartWeight = new Chart(document.getElementById('weightChart').getContext('2d'), {
        type: 'line',
        data: {
            labels: timelinesLabels,
            datasets: [
                { label: 'Cat A (Lighter)', data: seriesCatALighter, borderColor: '#4299e1', backgroundColor: '#4299e1', spanGaps: true, tension: 0.15, pointRadius: 3 },
                { label: 'Cat B (Heavier)', data: seriesCatBHeavier, borderColor: '#ed64a6', backgroundColor: '#ed64a6', spanGaps: true, tension: 0.15, pointRadius: 3 }
            ]
        },
        options: { responsive: true, Glen: true, maintainAspectRatio: false, scales: { y: { title: { display: true, text: 'Weight (kg)' } } } }
    });

    // Chart 2: Daily Volume Tracking Trend (The requested visit count over days graph)
    chartDailyVolume = new Chart(document.getElementById('dailyVolumeChart').getContext('2d'), {
        type: 'line',
        data: {
            labels: dailyVolumeLabels,
            datasets: [{
                label: 'Total Visits Per Day',
                data: dailyVolumeData,
                borderColor: '#805ad5',
                backgroundColor: 'rgba(128, 90, 213, 0.1)',
                fill: true,
                tension: 0.2,
                pointRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: true, ticks: { stepSize: 1 }, title: { display: true, text: 'Visit Volume' } }
            }
        }
    });

    // Chart 3: Hourly Diurnal Density Histogram
    const hourLabelsArr = Array.from({length: 24}, (_, i) => `${i}:00`);
    chartHourlyDensity = new Chart(document.getElementById('hourlyDensityChart').getContext('2d'), {
        type: 'bar',
        data: {
            labels: hourLabelsArr,
            datasets: [{ label: 'Cumulative Traffic Frequency', data: hourlyCounts, backgroundColor: '#48bb78' }]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, title: { display: true, text: 'Visits' } } } }
    });
}
</script>
</body>
</html>
