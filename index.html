<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Litter-Robot Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #f8fafc; --card: #ffffff; --text: #333; --radio-bg: #e2e8f0; }
        [data-theme='dark'] { --primary: #63b3ed; --bg: #1a202c; --card: #2d3748; --text: #f7fafc; --radio-bg: #4a5568; }
        
        body { font-family: 'Segoe UI', system-ui; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .progress-bar { height: 10px; background: #e2e8f0; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--primary); transition: width 0.5s; }
        .warning { color: #e53e3e; font-weight: bold; }
        
        .period-selector { display: flex; justify-content: center; gap: 5px; margin: 25px 0; flex-wrap: wrap; }
        .period-selector input { display: none; }
        .period-selector label { padding: 8px 16px; background: var(--radio-bg); color: var(--text); cursor: pointer; border-radius: 20px; font-weight: 600; }
        .period-selector input:checked + label { background: var(--primary); color: white; }
        
        .chart-wrapper-large { position: relative; height: 450px; width: 100%; }
        .chart-wrapper-standard { position: relative; height: 300px; width: 100%; }
        .robot-image { max-height: 160px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
    </style>
</head>
<body>

<div class="container" style="max-width: 1100px; margin: auto;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>🐈 Litter-Robot Dashboard</h1>
        <div style="font-size: 0.8em; opacity: 0.7;">Updated: <span id="lastUpdated">N/A</span></div>
        <button onclick="toggleDarkMode()" ... >🌓 Theme</button>
    </div>


    <!-- Robot Card -->
    <div class="card" style="margin-bottom: 20px;">
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div style="display: flex; justify-content: center;">
                <img src="lr4-white.png" onerror="this.src='https://placehold.co/200x200/ffffff/4a90e2?text=Upload+lr4-white.png+Here&font=Montserrat'" class="robot-image">
            </div>
            <div>
                <h3>Robot Status</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;">
                    <div>Status: <strong id="opStatus">...</strong></div>
                    <div>Network: <strong id="netStatus">...</strong></div>
                    <div>Scoops: <strong id="scoopCount">...</strong></div>
                    <div>Last Cycle: <strong id="lastSeen">...</strong></div>
                </div>
                <div style="margin-top: 15px;">
                    Litter: <div class="progress-bar"><div id="litterBar" class="progress-fill" style="width: 0%"></div></div>
                    Waste: <div class="progress-bar"><div id="wasteBar" class="progress-fill" style="width: 0%"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="catCards" class="grid"></div>

    <div class="period-selector">
        <input type="radio" name="period" id="p14" value="14" checked onchange="updateCharts()"><label for="p14">14d</label>
        <input type="radio" name="period" id="p30" value="30" onchange="updateCharts()"><label for="p30">30d</label>
        <input type="radio" name="period" id="p90" value="90" onchange="updateCharts()"><label for="p90">90d</label>
        <input type="radio" name="period" id="p180" value="180" onchange="updateCharts()"><label for="p180">180d</label>
        <input type="radio" name="period" id="pAll" value="9999" onchange="updateCharts()"><label for="pAll">All</label>
    </div>

    <div class="card" style="margin-bottom: 20px;">
        <h3>Visit Timeline</h3>
        <div class="chart-wrapper-large"><canvas id="scatterChart"></canvas></div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Weight History (kg)</h3>
            <div class="chart-wrapper-standard"><canvas id="weightChart"></canvas></div>
        </div>
        <div class="card">
            <h3>Visits History</h3>
            <div class="chart-wrapper-standard"><canvas id="visitChart"></canvas></div>
        </div>
    </div>
</div>

<script>
    let dashboardData = {};
    let charts = {};
    const catColors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6'];

    function toggleDarkMode() {
        const isDark = document.body.dataset.theme === 'dark';
        document.body.dataset.theme = isDark ? 'light' : 'dark';
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        updateCharts();
    }

    function timeAgo(date) {
        if(!date || date === 'None') return 'N/A';
        const seconds = Math.floor((new Date() - new Date(date)) / 1000);
        if (seconds < 60) return "Just now";
        if (seconds < 3600) return Math.floor(seconds/60) + "m ago";
        if (seconds < 86400) return Math.floor(seconds/3600) + "h ago";
        return Math.floor(seconds/86400) + "d ago";
    }

    async function init() {
        const res = await fetch('data.json?t=' + Date.now());
        dashboardData = await res.json();
        if(localStorage.getItem('theme') === 'dark') document.body.dataset.theme = 'dark';
        renderStats();
        updateCharts();
    }

    function renderStats() {
        document.getElementById('opStatus').textContent = dashboardData.robot_metadata.status;
        document.getElementById('netStatus').textContent = dashboardData.robot_metadata.is_online ? "Online" : "Offline";
        document.getElementById('scoopCount').textContent = dashboardData.robot_metadata.cycle_count;
        document.getElementById('lastSeen').textContent = timeAgo(dashboardData.robot_metadata.last_seen);
        document.getElementById('lastUpdated').textContent = dashboardData.robot_metadata.generated_at;
        document.getElementById('litterBar').style.width = dashboardData.robot_metadata.litter_level + "%";
        document.getElementById('wasteBar').style.width = dashboardData.robot_metadata.waste_level + "%";

        const container = document.getElementById('catCards');
        container.innerHTML = "";
        dashboardData.pet_profiles.forEach((cat, i) => {
            const last30 = cat.history.filter(h => new Date(h.timestamp) > new Date(Date.now() - 30*86400000));
            const avg = last30.reduce((sum, curr) => sum + curr.weight, 0) / (last30.length || 1);
            const isAlert = (cat.latest_weight < (avg * 0.95));

            container.innerHTML += `
                <div class="card" style="display: flex; gap: 15px; align-items: center;">
                    <img src="${cat.profile_pic}" style="width:70px; height:70px; border-radius:50%; object-fit:cover; border: 4px solid ${catColors[i % catColors.length]};">
                    <div>
                        <h3 style="margin: 0;">${cat.name} ${isAlert ? '<span class="warning">⚠️</span>' : ''}</h3>
                        <p style="margin: 2px 0;">Weight: <strong>${cat.latest_weight} kg</strong></p>
                        <p style="margin: 2px 0; font-size: 0.85em;">Today: ${cat.visits_today} | Avg: ${cat.avg_visits}/d</p>
                        <p style="margin: 2px 0; font-size: 0.85em; opacity: 0.7;">Last: ${timeAgo(cat.last_visit)}</p>
                    </div>
                </div>`;
        });
    }

    const nightShadePlugin = {
        id: 'nightShade',
        beforeDraw: (chart) => {
            if (chart.config.type !== 'scatter') return;
            const { ctx, chartArea: { top, bottom }, scales: { x } } = chart;
            ctx.save();
            ctx.fillStyle = document.body.dataset.theme === 'dark' ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.04)';
            const x0 = x.getPixelForValue(0), x6 = x.getPixelForValue(6);
            const x20 = x.getPixelForValue(20), x24 = x.getPixelForValue(24);
            if (x0 && x6) ctx.fillRect(x0, top, x6 - x0, bottom - top);
            if (x20 && x24) ctx.fillRect(x20, top, x24 - x20, bottom - top);
            ctx.restore();
        }
    };

    function updateCharts() {
        const days = parseInt(document.querySelector('input[name="period"]:checked').value);
        const cutoff = new Date(Date.now() - days * 86400000);
        
        const isDark = document.body.dataset.theme === 'dark';
        const textColor = isDark ? '#f7fafc' : '#333';
        
        Chart.defaults.color = textColor;
        Chart.defaults.borderColor = isDark ? '#4a5568' : '#e2e8f0';

        if(charts.scatter) charts.scatter.destroy();
        if(charts.weight) charts.weight.destroy();
        if(charts.visit) charts.visit.destroy();

        // Standard configuration with Tooltips ON, but Legend Click OFF
        const chartOptions = {
            maintainAspectRatio: false,
            plugins: {
                legend: { 
                    labels: { color: textColor },
                    onClick: () => null // Disables legend toggling
                },
                tooltip: { enabled: true } // Keeps tooltips
            }
        };

        // Scatter
        charts.scatter = new Chart(document.getElementById('scatterChart'), {
            type: 'scatter',
            data: { datasets: dashboardData.pet_profiles.map((p, i) => ({
                label: p.name,
                backgroundColor: catColors[i % catColors.length],
                data: p.history.filter(l => new Date(l.timestamp) > cutoff).map(l => ({
                    x: new Date(l.timestamp).getHours() + (new Date(l.timestamp).getMinutes()/60),
                    y: new Date(l.timestamp).getTime()
                }))
            }))},
            options: { 
                ...chartOptions, 
                scales: { 
                    x: { title: {display: true, text: 'Hour of Day'}, min: 0, max: 24 }, 
                    y: { type: 'time', time: { unit: 'day' } } 
                } 
            },
            plugins: [nightShadePlugin]
        });

        // Weight
        charts.weight = new Chart(document.getElementById('weightChart'), {
            type: 'line',
            data: { datasets: dashboardData.pet_profiles.map((p, i) => ({
                label: p.name,
                borderColor: catColors[i % catColors.length],
                backgroundColor: catColors[i % catColors.length],
                data: p.history.filter(l => new Date(l.timestamp) > cutoff).map(l => ({ x: l.timestamp, y: l.weight }))
            }))},
            options: {
                ...chartOptions,
                scales: { x: { type: 'time', time: { unit: 'day' } } }
            }
        });

        // Visits
        charts.visit = new Chart(document.getElementById('visitChart'), {
            type: 'bar',
            data: { datasets: dashboardData.pet_profiles.map((p, i) => {
                const counts = {};
                p.history.filter(l => new Date(l.timestamp) > cutoff).forEach(l => {
                    const d = l.timestamp.split('T')[0];
                    counts[d] = (counts[d] || 0) + 1;
                });
                return { 
                    label: p.name, 
                    backgroundColor: catColors[i % catColors.length],
                    data: Object.keys(counts).map(d => ({ x: new Date(d).getTime(), y: counts[d] })) 
                };
            })},
            options: {
                ...chartOptions,
                scales: { x: { type: 'time', time: { unit: 'day' } } }
            }
        });
    }

    init();
</script>
</body>
</html>
