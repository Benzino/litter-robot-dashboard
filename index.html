<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Litter-Robot Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .status-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-around; }
        #statCats { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .cat-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .cat-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #cbd5e0; }
        .chart-container { background: white; padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Litter-Robot Dashboard</h1>
    
    <div class="status-box">
        <div>Robot: <strong id="robotName">-</strong></div>
        <div>WiFi: <strong id="wifiStatus">-</strong></div>
        <div>Cycles: <strong id="cycleCount">-</strong></div>
    </div>

    <div id="statCats"></div>

    <div class="chart-container">
        <canvas id="activityChart"></canvas>
    </div>
</div>

<script>
    async function loadData() {
        const response = await fetch('data.json?t=' + new Date().getTime());
        const data = await response.json();
        
        // Update Header Stats
        document.getElementById("robotName").textContent = data.robot_metadata.name;
        document.getElementById("wifiStatus").textContent = data.robot_metadata.is_online ? "Connected" : "Offline";
        document.getElementById("cycleCount").textContent = data.robot_metadata.cycle_count;

        // Render Cats
        const container = document.getElementById("statCats");
        container.innerHTML = "";
        data.pet_profiles.forEach(cat => {
            const card = document.createElement("div");
            card.className = "cat-card";
            card.innerHTML = `
                <img src="${cat.profile_pic}" class="cat-img" onerror="this.style.display='none'">
                <div>
                    <h3>${cat.name}</h3>
                    <p>Age: ${cat.age} years</p>
                    <p>Weight: ${cat.latest_weight} kg</p>
                    <p>Last Visit: ${cat.last_visit ? new Date(cat.last_visit).toLocaleTimeString() : 'N/A'}</p>
                </div>
            `;
            container.appendChild(card);
        });

        // Render Chart
        const ctx = document.getElementById('activityChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.logs.slice(-20).map(l => new Date(l.timestamp).toLocaleTimeString()),
                datasets: [{
                    label: 'Activity Events',
                    data: data.logs.slice(-20).map(l => l.weight || 0),
                    borderColor: '#4a90e2',
                    fill: false
                }]
            }
        });
    }
    loadData();
</script>
</body>
</html>
