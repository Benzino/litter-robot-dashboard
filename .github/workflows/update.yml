name: Hourly Litter Robot Update

on:
  schedule:
    - cron: '0 * * * *' # Runs at minute 0 of every hour
  workflow_dispatch: # Allows you to run it manually by clicking a button in GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylitterbot

      - name: Run Python script
        env:
          WHISKER_USERNAME: ${{ secrets.WHISKER_USERNAME }}
          WHISKER_PASSWORD: ${{ secrets.WHISKER_PASSWORD }}
        run: python update_data.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          # Only commit if history.json actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Hourly data update" && git push)